<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapCalipers — Custom Map Editor</title>
    <meta name="description" content="Create custom maps for MapCalipers. Add stops, draw routes, and export for use in JetLag and MapCalipers games.">
    <meta name="theme-color" content="#1a1a2e">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- JSZip -->
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <div class="toolbar-group">
            <div class="brand">
                <svg class="brand-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2 L12 22"/>
                    <path d="M2 12 L22 12"/>
                    <path d="M4.93 4.93 L19.07 19.07"/>
                </svg>
                <span class="brand-name">MapCalipers <span class="brand-sub">Editor</span></span>
            </div>
            <div class="toolbar-divider"></div>
        </div>
        <div class="toolbar-group toolbar-right">
            <button id="btn-import" class="action-btn" title="Import GTFS zip">Import</button>
            <button id="btn-export" class="action-btn primary" title="Export GTFS zip for MapCalipers">
                <span class="btn-icon">↓</span> Export ZIP for MapCalipers
            </button>
            <button id="btn-share" class="action-btn calipers-btn" title="Copy a shareable link to this project">
                🔗 Share
            </button>
            <button id="btn-new" class="action-btn danger" title="Start new project">New</button>
        </div>
    </div>

    <!-- Side panel -->
    <div id="panel">
        <div id="panel-toggle" title="Toggle panel">◀</div>

        <!-- Search -->
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search stops & routes…" autocomplete="off" />
        </div>

        <!-- Stops section -->
        <div class="panel-section">
            <h3>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Stops <span id="stop-count" class="badge">0</span>
                <button id="btn-add-stop" class="section-add-btn" title="Add stops by clicking the map">+</button>
            </h3>
            <ul id="stop-list" class="item-list"></ul>
            <p class="panel-hint" id="stop-hint">Press <strong>+</strong> then click the map to place stops.</p>
        </div>

        <!-- Routes section -->
        <div class="panel-section">
            <h3>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                Routes <span id="route-count" class="badge">0</span>
                <button id="btn-create-route" class="section-add-btn" title="Create a new route">+</button>
            </h3>
            <ul id="route-list" class="item-list"></ul>
            <p class="panel-hint" id="route-hint">Press <strong>+</strong> to create a route, then click stops to assign them.</p>
        </div>

        <!-- About -->
        <div class="panel-footer">
            <p>Build custom maps for <a href="https://joshspicer.com/mapcalipers" target="_blank">MapCalipers</a>.</p>
            <p><a href="https://apps.apple.com/us/app/map-calipers/id6746725018" target="_blank">Download on the App Store</a></p>
        </div>
    </div>

    <!-- Assign stops status bar (shown when a route is selected) -->
    <div id="assign-status" class="hidden">
        Click stops on the map to add/remove them from this route.
        <button id="btn-done-assign" class="action-btn small">Done</button>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file" accept=".zip" style="display:none" />

    <!-- JS Modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
